        { question: "Mahasiswa mempraktikkan langkah-langkah penggunaan aplikasi e-learning Moodle untuk membuat kuis interaktif. Aktivitas tersebut termasuk dalam kategori pengetahuan", options: ["faktual", "konseptual", "prosedural", "metakognitif"], correctAnswer: 2 },
        { question: "Perhatikan rumusan capaian pembelajaran berikut:\n\"Diberikan kasus pencemaran lingkungan di lokasi tempat pembuangan sampah, peserta didik mampu memberikan rekomendasi cara pengelolaan sampah rumah tangga.\"\nRumusan tersebut termasuk jenis pengetahuan kognitif....", options: ["evaluasi", "sintesis", "aplikasi", "pemahaman"], correctAnswer: 0 },
        { question: "Perhatikan rumusan capaian pembelajaran berikut:\n\"Setelah mempelajari materi tentang cuaca, siswa mampu menjelaskan proses terjadinya hujan.\"\nRumusan tersebut termasuk jenis pengetahuan kognitif ....", options: ["evaluasi", "sintesis", "aplikasi", "pemahaman"], correctAnswer: 3 },
        { question: "Berikut adalah contoh motivasi ekstrinsik peserta didik dalam belajar, kecuali ....", options: ["Anstri belajar Kimia karena orang tuanya ingin Anstri menjadi apoteker", "Rudy kecewa karena orang tuanya tidak memberikan hadiah ketika ia naik kelas", "Ihsan menentukan target ia harus mendapatkan skor 100 dalam pelajaran Agama", "Ronald mengincar hadiah sepeda bila ia mendapatkan ranking 1"], correctAnswer: 2 },
        { question: "Menurut teori motivasi belajar, motivasi intrinsik dapat memengaruhi proses pembelajaran karena", options: ["membuat mahasiswa fokus pada hasil akhir, bukan proses", "menumbuhkan semangat belajar yang berkelanjutan dan mandiri", "mendorong mahasiswa untuk mengandalkan hadiah eksternal", "mengurangi keinginan mahasiswa untuk mengeksplorasi pengetahuan"], correctAnswer: 1 },
        { question: "Berikut adalah contoh motivasi ekstrinsik peserta didik dalam belajar", options: ["Amy senang belajar Fisika karena ingin kuliah di Teknik Elektro", "Gafur kecewa terhadap orang tuanya yang tidak memberikan hadiah ketika ia naik kelas", "Lia menentukan target mendapat skor 100 dalam Matematika", "Anton mampu menyeimbangkan waktu belajar dengan bermain"], correctAnswer: 1 },
        { question: "Berikut adalah faktor eksternal yang mempengaruhi belajar peserta didik, kecuali ....", options: ["lingkungan tempat tinggal peserta didik", "kondisi keluarga peserta didik", "status sosial ekonomi peserta didik", "minat peserta didik untuk belajar"], correctAnswer: 3 },
        { question: "Seorang mahasiswa merasa sulit fokus belajar karena lingkungan rumahnya bising dan kurang kondusif. Masalah tersebut berkaitan dengan", options: ["faktor internal berupa kesiapan belajar", "faktor eksternal berupa tingkat kecerdasan teman sebaya", "faktor internal berupa gaya belajar individu", "faktor eksternal berupa kondisi lingkungan belajar"], correctAnswer: 3 },
        { question: "Salah satu faktor internal yang mempengaruhi belajar peserta didik adalah ....", options: ["status sosial ekonomi peserta didik", "kondisi keluarga peserta didik", "minat peserta didik untuk belajar", "lingkungan tempat tinggal peserta didik"], correctAnswer: 2 },
        { question: "Pembelajaran adalah pengaturan dan penciptaan kondisi-kondisi eksternal sedemikian rupa sehingga menunjang proses belajar peserta didik. Pengertian ini dikemukakan oleh", options: ["Kaufman", "Smaldino", "Gagné", "Winkel"], correctAnswer: 2 },
        { question: "Menurut Gagné (1977), salah satu faktor eksternal penting yang harus disiapkan dalam pembelajaran adalah", options: ["motivasi peserta didik", "motivasi pendidik", "kegiatan belajar peserta didik", "kesehatan peserta didik"], correctAnswer: 2 },
        { question: "Contoh penerapan konsep pembelajaran menurut Smaldino adalah", options: ["Mahasiswa mempelajari teori tanpa praktik dan tanpa media.", "Dosen menyampaikan materi hanya melalui ceramah sepanjang perkuliahan.", "Dosen merancang aktivitas diskusi berbasis video interaktif pada LMS.", "Mahasiswa belajar sendiri tanpa adanya tujuan pembelajaran."], correctAnswer: 2 },
        { question: "Dari kegiatan berikut ini, manakah yang bukan merupakan kegiatan pembelajaran?", options: ["Pendidik mengajar peserta didik.", "Pendidik membagikan buku paket kepada peserta didik.", "Pendidik membimbing peserta didik melakukan observasi lapangan.", "Pendidik menyajikan materi tentang proses terjadinya hujan."], correctAnswer: 1 },
        { question: "Pernyataan yang tepat mengenai hubungan antara pengajaran dan pembelajaran adalah ....", options: ["Pengajaran dan pembelajaran adalah dua proses yang sama.", "Pembelajaran dapat terjadi tanpa pengajaran, tetapi pengajaran tidak selalu menghasilkan pembelajaran.", "Pengajaran selalu menjamin keberhasilan pembelajaran.", "Pembelajaran hanya dapat dilakukan melalui pengajaran langsung."], correctAnswer: 1 },
        { question: "Dari kegiatan berikut ini, manakah yang paling tepat menunjukkan kegiatan pembelajaran?", options: ["Peserta didik hadir mendengarkan penjelasan pendidik di kelas.", "Pendidik membagikan buku paket kepada peserta didik.", "Peserta didik praktik mengamati sel hewan dan tumbuhan dalam kelompok.", "Pendidik menyajikan materi tentang proses terjadinya fotosintesis kepada peserta didik."], correctAnswer: 2 },
        { question: "Adit adalah seorang lulusan SMK Jurusan Akuntansi. Ia bekerja di sebuah toko online dan selalu berkomunikasi dengan mitra kerjanya di seluruh dunia melalui internet. Kecakapan yang dimiliki Adit termasuk dalam kecakapan", options: ["Kreativitas dan inovasi", "Berkomunikasi dan berkolaborasi", "Memecahkan masalah", "Berpikir kritis"], correctAnswer: 1 },
        { question: "Dosen memberikan dua pilihan strategi pembelajaran untuk materi Kewargaan Digital: \n1. Diskusi berbasis kasus nyata pelanggaran etika digital.\n2. Ceramah tradisional berbasis teori.\nJika tujuan pembelajaran adalah meningkatkan kesadaran dan keterampilan etis mahasiswa di ruang digital, keputusan terbaik adalah", options: ["Memilih diskusi berbasis kasus karena mendorong partisipasi aktif dan refleksi kritis.", "Memilih ceramah tradisional karena dosen dapat mengontrol isi materi.", "Menggabungkan keduanya tanpa mempertimbangkan keterbatasan waktu perkuliahan.", "Menggunakan metode ceramah karena dianggap lebih cepat menyampaikan teori."], correctAnswer: 0 },

        { question: "Seorang dosen memprogram LMS untuk memberikan umpan balik otomatis berupa \"Selamat! Jawaban Anda benar\" setiap kali mahasiswa berhasil menjawab soal latihan. Berdasarkan teori behavioristik, praktik ini bertujuan untuk", options: ["Membantu mahasiswa mengembangkan metakognisi.", "Memperkuat respons yang benar melalui penguatan positif.", "Mendorong mahasiswa membangun makna personal.", "Memberikan kebebasan mahasiswa mengeksplorasi konsep secara mandiri."], correctAnswer: 1 },
        { question: "Berikut ini yang merupakan penjelasan belajar menurut teori behavioristik adalah ....", options: ["Proses interaksional untuk memperoleh pemahaman baru.", "Proses belajar dari pengalaman langsung sebagai akibat tindakan seseorang.", "Perpindahan dari pengaruh lingkungan ke arah faktor manusia.", "Perubahan tingkah laku sebagai hasil interaksi antara stimulus dan respons."], correctAnswer: 3 },
        { question: "Berikut ini yang merupakan penjelasan belajar menurut teori behavioristik adalah ....", options: ["Proses interaksional untuk memperoleh pemahaman baru.", "Perubahan tingkah laku sebagai hasil interaksi antara stimulus dan respons, menekankan hasil belajar (outcome) dan kurang memperhatikan proses.", "Belajar dari pengalaman langsung (enactive learning).", "Perpindahan dari pengaruh lingkungan ke arah faktor manusia."], correctAnswer: 1 },
        { question: "Di sebuah kelas, seorang pendidik memberikan pujian kepada peserta didik atas hasil karya atau keberaniannya mengemukakan pendapat. Jika pujian tidak diberikan, peserta didik tidak tertarik lagi untuk berkarya. Contoh tersebut merupakan teori behavioristik Skinner yaitu", options: ["Negative reinforcement", "Positive reinforcement", "Law of effect", "Operant conditioning"], correctAnswer: 1 },
        { question: "John Broadus Watson merupakan tokoh teori behavioristik. Pandangannya berfokus pada pentingnya ....", options: ["kesehatan fisik individu sejak dalam kandungan", "motivasi intrinsik mahasiswa", "faktor lingkungan dalam proses belajar individu", "perubahan mental mahasiswa"], correctAnswer: 2 },
        { question: "Menurut teori belajar Guthrie, hubungan antara stimulus dan respons terbentuk karena ...", options: ["penguatan yang diberikan terus-menerus", "kedekatan waktu antara stimulus dan respons (contiguity)", "hukuman setelah respons salah", "motivasi internal individu"], correctAnswer: 1 },
        { question: "Benny berlatih pukulan smash bulutangkis secara rutin sehingga keterampilannya semakin baik. Kegiatan tersebut merupakan penerapan teori Thorndike yaitu hukum", options: ["Trial and error", "Law of effect", "Law of readiness", "Law of exercise"], correctAnswer: 3 },
        { question: "Dalam pembelajaran seni tari, peserta didik yang siap mempelajari gerakan baru akan merasa puas, sedangkan yang belum siap akan merasa terpaksa. Hal ini sesuai dengan hukum belajar Thorndike, yaitu", options: ["Trial and error", "Law of effect", "Law of readiness", "Law of exercise"], correctAnswer: 2 },
        { question: "Mengapa hukum kesiapan penting dalam proses belajar mengajar?", options: ["Karena memastikan adanya motivasi dan kesiapan akan membuat proses belajar lebih optimal.", "Karena dapat menggantikan peran stimulus dan respons.", "Karena menjadi satu-satunya faktor penentu hasil belajar.", "Karena lebih menekankan penghafalan materi."], correctAnswer: 0 },
        { question: "Jika seorang siswa memiliki kebiasaan berbicara di kelas, penerapan metode kelelahan menurut Guthrie adalah", options: ["memberikan penghargaan ketika siswa berhasil diam", "memberikan hukuman agar siswa tidak mengulanginya", "mengganti kebiasaan berbicara dengan aktivitas mencatat", "meminta siswa berbicara terus-menerus hingga bosan dan berhenti"], correctAnswer: 3 },

    let quizData = [];
    let currentQuestionIndex = 0;
    let userAnswers = []; 
    let checkedStatus = []; 
    
    // Array untuk label abjad
    const alphabetLabels = ['A', 'B', 'C', 'D', 'E'];

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const progressEl = document.getElementById('progress-text');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnCheck = document.getElementById('btn-check');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const scoreEl = document.getElementById('score');

    // FUNGSI UNTUK MENGACAK ARRAY (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function initQuiz() {
        // Mengacak urutan soal setiap kali kuis dimulai atau diulang
        quizData = shuffleArray(originalQuestions); 
        
        userAnswers = new Array(quizData.length).fill(null);
        checkedStatus = new Array(quizData.length).fill(false);
        currentQuestionIndex = 0;
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        const currentData = quizData[currentQuestionIndex];
        
        // Menambahkan nomor urut di awal teks pertanyaan
        questionEl.innerText = `${currentQuestionIndex + 1}. ${currentData.question}`;
        
        progressEl.innerText = `Soal ${currentQuestionIndex + 1} dari ${quizData.length}`;
        
        optionsEl.innerHTML = '';

        currentData.options.forEach((option, index) => {
            const div = document.createElement('div');
            div.classList.add('option');
            
            // Membuat elemen span khusus untuk label (A., B., C., D.)
            const labelSpan = document.createElement('span');
            labelSpan.classList.add('option-label');
            labelSpan.innerText = `${alphabetLabels[index]}.`;
            
            // Membuat elemen span khusus untuk teks jawabannya
            const textSpan = document.createElement('span');
            textSpan.innerText = option;
            
            // Memasukkan label dan teks ke dalam div opsi
            div.appendChild(labelSpan);
            div.appendChild(textSpan);
            
            if (userAnswers[currentQuestionIndex] === index) {
                div.classList.add('selected');
            }

            if (checkedStatus[currentQuestionIndex]) {
                div.style.pointerEvents = 'none'; 
                if (index === currentData.correctAnswer) {
                    div.classList.add('correct');
                } else if (userAnswers[currentQuestionIndex] === index) {
                    div.classList.add('wrong');
                }
            } else {
                div.addEventListener('click', () => selectOption(index));
            }

            optionsEl.appendChild(div);
        });

        updateButtons();
    }

    function selectOption(selectedIndex) {
        if (checkedStatus[currentQuestionIndex]) return; 

        userAnswers[currentQuestionIndex] = selectedIndex;
        
        const options = optionsEl.children;
        for (let i = 0; i < options.length; i++) {
            options[i].classList.remove('selected');
        }
        
        options[selectedIndex].classList.add('selected');
        updateButtons();
    }

    function checkAnswer() {
        if (userAnswers[currentQuestionIndex] === null) {
            alert("Pilih jawaban yang paling comel dulu ya! 🎀");
            return;
        }

        checkedStatus[currentQuestionIndex] = true;
        const currentData = quizData[currentQuestionIndex];
        const options = optionsEl.children;

        for (let i = 0; i < options.length; i++) {
            options[i].style.pointerEvents = 'none';
            if (i === currentData.correctAnswer) {
                options[i].classList.add('correct');
                options[i].classList.remove('selected');
            } else if (i === userAnswers[currentQuestionIndex]) {
                options[i].classList.add('wrong');
                options[i].classList.remove('selected');
            }
        }
        updateButtons();
    }

    function updateButtons() {
        btnPrev.disabled = currentQuestionIndex === 0;
        btnCheck.disabled = userAnswers[currentQuestionIndex] === null || checkedStatus[currentQuestionIndex];

        if (currentQuestionIndex === quizData.length - 1) {
            btnNext.innerText = "Selesai 💖";
        } else {
            btnNext.innerText = "Selanjutnya 🎀";
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';

        let score = 0;
        for (let i = 0; i < quizData.length; i++) {
            if (userAnswers[i] === quizData[i].correctAnswer) {
                score++;
            }
        }

        scoreEl.innerText = `Skor Kamu: ${score} / ${quizData.length}`;
    }

    function retakeQuiz() {
        window.scrollTo({top: 0, behavior: 'smooth'});
        initQuiz(); 
    }

    initQuiz();
</script>
